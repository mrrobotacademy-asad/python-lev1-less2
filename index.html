<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Page - Fixed</title>

<style>
body{
    font-family: Cairo;
    background:#0f0c29;
    color:white;
    text-align:center;
}

.container{
    width:90%;
    max-width:800px;
    margin:auto;
    background:rgba(255,255,255,0.05);
    padding:20px;
    border-radius:15px;
}

.option-btn{
    display:block;
    width:100%;
    margin:10px 0;
    padding:15px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    background:#222;
    color:white;
}

.option-btn:hover{background:#333;}

.hidden{display:none;}

#hint-box{
    margin-top:10px;
    padding:10px;
    background:#ff4757;
    border-radius:10px;
    display:none;
}

.nav{
    margin-top:15px;
}

button{
    padding:10px 15px;
    margin:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h2 id="q-text"></h2>
<pre id="q-code"></pre>

<div id="options-container"></div>

<div>
<input id="user-code-input" class="hidden" placeholder="اكتب إجابتك">
</div>

<div id="hint-box">
<span id="hint-text"></span>
</div>

<div class="nav">
<button onclick="handleStep()">تأكيد</button>
<button onclick="nextQuestion()">التالي</button>
<button onclick="revealAnswer()">كشف الإجابة</button>
</div>

<p>النتيجة: <span id="score-val">0</span></p>

</div>

<script>
let currentQ = 0;
let score = 0;
let answered = false;

/* مثال أسئلة */
const questions = [
{
    q:"ما ناتج 2 + 2؟",
    type:"select",
    options:["3","4","5"],
    ans:"4",
    hint:"راجع العمليات الحسابية"
},
{
    q:"اكتب كلمة Python",
    type:"input",
    ans:"python",
    hint:"حروف صغيرة"
}
];

function loadQuestion(){
    answered = false;

    let q = questions[currentQ];

    document.getElementById("q-text").innerText = q.q;

    let opt = document.getElementById("options-container");
    let input = document.getElementById("user-code-input");

    opt.innerHTML = "";

    if(q.type === "select"){
        input.classList.add("hidden");
        opt.classList.remove("hidden");

        q.options.forEach(o=>{
            let b = document.createElement("button");
            b.className="option-btn";
            b.innerText=o;

            b.onclick=()=>{
                if(answered) return;
                checkAnswer(o);
            };

            opt.appendChild(b);
        });

    }else{
        opt.classList.add("hidden");
        input.classList.remove("hidden");
        input.value = "";
    }
}

function checkAnswer(val){
    if(answered) return;
    answered = true;

    let q = questions[currentQ];

    if(val.toString().trim().toLowerCase() === q.ans.toLowerCase()){
        score += 10;
        document.getElementById("score-val").innerText = score;
    }else{
        document.getElementById("hint-box").style.display="block";
        document.getElementById("hint-text").innerText=q.hint;
    }
}

function handleStep(){
    let q = questions[currentQ];

    if(answered) return nextQuestion();

    let val = q.type==="select"
        ? null
        : document.getElementById("user-code-input").value;

    if(q.type==="input" && !val){
        alert("اكتب إجابة");
        return;
    }

    checkAnswer(val || q.userAns);
}

function nextQuestion(){
    currentQ++;

    if(currentQ >= questions.length){
        alert("انتهى الاختبار");
        return;
    }

    document.getElementById("hint-box").style.display="none";
    loadQuestion();
}

function revealAnswer(){
    if(answered) return;

    if(confirm("خصم 10 نقاط؟")){
        score = Math.max(0, score - 10);
        document.getElementById("score-val").innerText = score;

        alert("الإجابة: " + questions[currentQ].ans);
        answered = true;
    }
}

/* start */
loadQuestion();
</script>

</body>
</html>
